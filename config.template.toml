# Main runtime configuration for the API.
# Copy this file to config.toml and replace placeholder values.

[database]
# PostgreSQL connection string used by Drizzle/Nest at runtime.
# Format: postgresql://<username>:<password>@<host>:<port>/<database>
connection_string = "postgresql://<username>:<password>@localhost:5432/<database>"

# Enable TLS for database connection.
# false: local development (typical)
# true: managed/prod database with SSL enabled
ssl = false

# Cache TTL in milliseconds for Drizzle query caching (default: 60000 = 1 minute).
# cache_ttl_ms = 60000

[auth]
# Access token settings (used for API authentication).
# secret: Base64 string, minimum 44 chars (validated by schema)
# expires_in: token lifetime in seconds (1800 = 30 minutes)
access = {secret = "<access_secret>", expires_in = 1800}

# Forgot-password token settings.
# secret: Base64 string, minimum 44 chars
# expires_in: token lifetime in seconds (1800 = 30 minutes)
forgot_password = {secret = "<forgot_password_secret>", expires_in = 1800}

# Refresh token settings (used to mint new access tokens).
# secret: Base64 string, minimum 44 chars
# expires_in: refresh token JWT lifetime in seconds (86400 = 24 hours)
# max_expires_in: max family lifetime in seconds for token rotation (2592000 = 30 days)
refresh = {secret = "<refresh_secret>", expires_in = 86400, max_expires_in = 2592000}

[rate_limit]
# Rate limiting settings for API requests.
# max_requests_per_window: maximum number of requests allowed per IP address within the time window.
max_requests_per_window = 100

# ttl_seconds: time window for rate limiting in seconds (3600 = 1 hour). 
# After this time, the request count for each IP address will reset.
ttl_seconds = 3600 # Time window for rate limiting (3600 = 1 hour)
